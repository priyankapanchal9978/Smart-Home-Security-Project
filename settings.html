<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Settings – Smart Home Security</title>
<div class="header">
  <span style="cursor:pointer" onclick="goBack()">⬅</span>
  &nbsp; Settings
</div>

<style>
body{
  margin:0;
  font-family:Segoe UI, Arial;
  background:#f4f7ff;
  background:
    linear-gradient(rgba(204, 221, 248, 0.75),rgba(204,221,248,0.75)),
    url("bg.jpg") no-repeat center/cover;
  color:#1e3c72;
}

/* HEADER */
.header{
  height:64px;
  background:#ffffff;
  display:flex;
  align-items:center;
  padding:0 24px;
  box-shadow:0 6px 20px rgba(0,0,0,.12);
  font-size:18px;
  font-weight:700;
}

/* CONTAINER */
.container{
  max-width:900px;
  margin:40px auto;
  background:white;
  border-radius:24px;
  padding:30px;
  box-shadow:0 30px 80px rgba(30,60,114,.2);
}

/* SECTION */
.section{
  margin-bottom:30px;
}
.section h3{
  margin-bottom:16px;
  border-bottom:2px solid #eef2ff;
  padding-bottom:6px;
}

/* ROW */
.row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin:14px 0;
  font-size:15px;
}

/* TOGGLE */
.switch{
  position:relative;
  width:50px;
  height:26px;
}
.switch input{display:none}
.slider{
  position:absolute;
  inset:0;
  background:#cfd8ff;
  border-radius:30px;
  cursor:pointer;
}
.slider:before{
  content:"";
  position:absolute;
  width:20px;
  height:20px;
  background:white;
  top:3px;
  left:4px;
  border-radius:50%;
  transition:.3s;
}
input:checked + .slider{
  background:#1e3c72;
}
input:checked + .slider:before{
  transform:translateX(24px);
}

/* SELECT */
select, input[type=range]{
  padding:6px;
  border-radius:8px;
  border:1px solid #cfd8ff;
}

/* FOOTER */
.footer{
  text-align:right;
  margin-top:30px;
}
button{
  padding:10px 18px;
  border:none;
  border-radius:10px;
  background:#1e3c72;
  color:white;
  font-weight:600;
  cursor:pointer;
}
</style>
</head>

<body>


<div class="container">

  <!-- CAMERA -->
  <div class="section">
    <h3>Camera</h3>

    <div class="row">
      <span>Enable Camera</span>
      <label class="switch">
        <input type="checkbox" checked>
        <span class="slider"></span>
      </label>
    </div>

    <div class="row">
      <span>Camera Quality</span>
      <select>
        <option>720p</option>
        <option selected>1080p</option>
        <option>4K</option>
      </select>
    </div>
  </div>

  <!-- FACE RECOGNITION -->
  <div class="section">
    <h3>Face Recognition</h3>

    <div class="row">
      <span>Recognition Sensitivity</span>
      <input type="range" min="1" max="10" value="7">
    </div>

    <div class="row">
      <span>Unknown Face Detection</span>
      <label class="switch">
        <input type="checkbox" checked>
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <!-- ALERTS -->
  <div class="section">
    <h3>Alerts & Notifications</h3>

    <div class="row">
      <span>Sound Alert</span>
      <label class="switch">
        <input type="checkbox" checked>
        <span class="slider"></span>
      </label>
    </div>

    <div class="row">
      <span>Mobile Notification</span>
      <label class="switch">
        <input type="checkbox">
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <!-- SECURITY -->
  <div class="section">
    <h3>Security Mode</h3>

    <div class="row">
      <span>System Mode</span>
      <select>
        <option>Normal</option>
        <option selected>High Security</option>
        <option>Emergency Lockdown</option>
      </select>
    </div>
  </div>

  <!-- SYSTEM -->
  <div class="section">
    <h3>System Info</h3>

    <div class="row">
      <span>Device ID</span>
      <span>SHS-IND-001</span>
    </div>

    <div class="row">
      <span>API Status</span>
      <span style="color:green;font-weight:600">Connected</span>
    </div>
  </div>

  <div class="footer">
    <button onclick="saveSettings()">Save Settings</button>
  </div>

</div>

<script>
function saveSettings(){
  alert("Settings saved successfully");

  /*
  BACKEND API EXAMPLE:
  fetch('/api/settings',{
    method:'POST',
    body: JSON.stringify(settings)
  })
  */
}
</script>
<script>
function goBack(){
  window.location.href = "dashboard.html";
}
</script>

</body>
</html>
