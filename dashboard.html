<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Home – Live Security</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:Segoe UI,Arial;
  background:
    linear-gradient(rgba(204,221,248,0.75),rgba(204,221,248,0.75)),
    url("bg.jpg") no-repeat center/cover;
  color:#1e3c72;
}

/* TOP BAR */
.top-bar{
height:64px;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 24px;
background:rgba(255,255,255,.9);
backdrop-filter:blur(12px);
box-shadow:0 8px 24px rgba(0,0,0,.12);
}

.logo{font-weight:700;font-size:18px}

.controls button{
margin-left:10px;
padding:8px 16px;
border:none;
border-radius:10px;
background:#1e3c72;
color:white;
font-weight:600;
cursor:pointer;
}

/* MAIN */
.main{
display:flex;
gap:30px;
padding:30px;
min-height:calc(100vh - 64px);
}

/* LEFT PANEL */
.instructions{
flex:1;
background:rgba(255,255,255,.85);
backdrop-filter:blur(14px);
border-radius:26px;
box-shadow:0 30px 80px rgba(30,60,114,.2);
overflow:hidden;
}

.guide-image{
width:100%;
height:100%;
object-fit:cover;
border-radius:26px;
}

/* SCAN PANEL */
.scan-area{
width:420px;
height:520px;
background:white;
border-radius:30px;
box-shadow:0 40px 100px rgba(30,60,114,.28);
overflow:hidden;
display:flex;
flex-direction:column;
}

.video-wrapper{
flex:1;
position:relative;
}

.video-wrapper img{
width:100%;
height:100%;
object-fit:cover;
transform:scaleX(-1);
}

.result-box{
padding:16px;
text-align:center;
}

.person{
font-size:16px;
font-weight:600;
}

.status{
font-size:15px;
font-weight:700;
margin-top:6px;
}

.status.safe{color:#1fa94a}
.status.risk{color:#d92d2d}

/* ALERT */
.alert-overlay{
position:fixed;
inset:0;
background:rgba(217,45,45,.92);
color:white;
display:none;
justify-content:center;
align-items:center;
z-index:50;
font-size:28px;
font-weight:800;
}

/* POPUP */
.access-popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
justify-content:center;
align-items:center;
z-index:100;
}

.popup-box{
background:white;
padding:30px;
border-radius:20px;
text-align:center;
width:320px;
}

.allow-btn{
background:#1fa94a;
color:white;
border:none;
padding:10px 20px;
margin:10px;
border-radius:10px;
cursor:pointer;
}

.deny-btn{
background:#d92d2d;
color:white;
border:none;
padding:10px 20px;
margin:10px;
border-radius:10px;
cursor:pointer;
}

@media(max-width:900px){
.main{flex-direction:column}
.scan-area{width:100%}
}
</style>
</head>

<body>

<div class="top-bar">
<div class="logo">🏠 SmartHome Security</div>
<div class="controls">
<button onclick="startScan()">📸 Scan</button>
<button>🚨 Alerts</button>
<button onclick="openSettings()">⚙️ Settings</button>
</div>
</div>

<div class="main">

<div class="instructions">
<img src="second.jpeg" class="guide-image">
</div>

<div class="scan-area">

<div class="video-wrapper">
<img id="camera-feed" src="http://127.0.0.1:5000/video">
</div>

<div class="result-box">
<div class="person" id="person-name">Waiting…</div>
<div class="status" id="status">—</div>
</div>

</div>
</div>

<div class="alert-overlay" id="alert">
🚨 UNAUTHORIZED ACCESS
</div>

<div id="access-popup" class="access-popup">
<div class="popup-box">
<h2>🚨 Visitor Detected</h2>
<p>Do you want to allow this person to enter?</p>

<button class="allow-btn" onclick="allowAccess()">Allow</button>
<button class="deny-btn" onclick="denyAccess()">Deny</button>
</div>
</div>

<script>

function startScan(){
setTimeout(()=>{
showResult("Unknown Person","risk");
},2000);
}

function showResult(name,status){

document.getElementById("person-name").innerText=name;
const st=document.getElementById("status");

if(status==="safe"){
st.innerText="🟢 AUTHORIZED";
st.className="status safe";
}else{

st.innerText="🔴 UNAUTHORIZED";
st.className="status risk";

document.getElementById("alert").style.display="flex";

setTimeout(()=>{
document.getElementById("alert").style.display="none";
showAccessPopup();
},2000);

}
}

function showAccessPopup(){
document.getElementById("access-popup").style.display="flex";
}

function allowAccess(){
alert("Door Opened ✅");
document.getElementById("access-popup").style.display="none";
}

function denyAccess(){
alert("Access Denied ❌");
document.getElementById("access-popup").style.display="none";
}

function openSettings(){
window.location.href="settings.html";
}

</script>

</body>
</html>
